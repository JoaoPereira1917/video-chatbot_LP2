#arquivo para gerenciar as imagens do docker------oh yeah
version: '3.8'
services:

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: videochatbot-pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: videochatbot
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data: