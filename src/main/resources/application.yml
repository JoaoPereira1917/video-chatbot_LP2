spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/videochatbot
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: none     # o Spring AI cuida do schema vetorial
    show-sql: false

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
      embedding:
        model: nomic-embed-text   # modelo separado só para embeddings

    vectorstore:
      pgvector:
        initialize-schema: true   # cria a tabela automaticamente na primeira vez
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768           # dimensão do nomic-embed-text