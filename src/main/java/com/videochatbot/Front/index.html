<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Chatbot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #7c6af7;
      --accent-dim:#3d3580;
      --text:      #e8e9f0;
      --muted:     #6b6e82;
      --user-bg:   #1e2235;
      --bot-bg:    #151820;
      --radius:    12px;
      --font:      'Inter', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
    }


    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 1fr 400px;
      height: 100vh;
      overflow: hidden;
    }


    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 16px; height: 16px; fill: #fff; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      transition: background 0.3s;
    }
    .status-dot.ready { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .status-dot.loading { background: #facc15; box-shadow: 0 0 6px #facc1588; }

    .status-label {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }


    .player-side {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* URL bar */
    .url-bar {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .url-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-bar input::placeholder { color: var(--muted); }
    .url-bar input:focus { border-color: var(--accent); }

    .btn-load {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-load:hover { opacity: 0.88; }
    .btn-load:active { transform: scale(0.97); }
    .btn-load:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Video wrapper */
    .video-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }
    .placeholder-icon {
      width: 64px; height: 64px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .placeholder-icon svg { width: 28px; height: 28px; fill: var(--muted); }
    .placeholder p { font-size: 14px; max-width: 240px; }

    /* Processing bar */
    .processing-bar {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      display: none;
      align-items: center;
      gap: 10px;
    }
    .processing-bar.active { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    .chat-side {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .chat-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .chat-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }


    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 92%;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
    }

    .message.user .bubble {
      background: var(--accent-dim);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 32px;
      pointer-events: none;
    }
    .empty-state svg { width: 36px; height: 36px; opacity: 0.4; }
    .empty-state p { font-size: 13px; max-width: 200px; }

    /* Input area */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .input-area textarea::placeholder { color: var(--muted); }
    .input-area textarea:focus { border-color: var(--accent); }

    .btn-send {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-send:hover { opacity: 0.88; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-send svg { width: 18px; height: 18px; fill: #fff; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1e2235;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { border-color: #f87171; color: #f87171; }
  </style>
</head>
<body>

<div class="app">


  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14.93V15a1 1 0 00-2 0v1.93A8.001 8.001 0 014.07 13H6a1 1 0 000-2H4.07A8.001 8.001 0 0111 4.07V6a1 1 0 002 0V4.07A8.001 8.001 0 0119.93 11H18a1 1 0 000 2h1.93A8.001 8.001 0 0113 16.93z"/></svg>
    </div>
    <h1>Video Chatbot</h1>
    <span class="status-label" id="statusLabel">aguardando vídeo</span>
    <div class="status-dot" id="statusDot"></div>
  </header>


  <div class="player-side">
    <div class="url-bar">
      <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
      <button class="btn-load" id="btnLoad" onclick="carregarVideo()">Carregar</button>
    </div>

    <div class="video-wrapper" id="videoWrapper">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <p>Cole o link de uma aula do YouTube para começar</p>
      </div>
      <iframe id="player" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>

    <div class="processing-bar" id="processingBar">
      <div class="spinner"></div>
      <span id="processingLabel">Processando vídeo, aguarde...</span>
    </div>
  </div>


  <div class="chat-side">
    <div class="chat-header">
      <h2>Assistente</h2>
      <p>Tire dúvidas sobre o conteúdo do vídeo</p>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2zm-2 10H6V10h12v2zm0-4H6V6h12v2z"/></svg>
        <p>Carregue um vídeo e faça sua primeira pergunta</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="chatInput" placeholder="Faça uma pergunta sobre o vídeo..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btnSend" onclick="enviarPergunta()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = 'http://localhost:8080/api';

  let videoCarregado = false;

  // Utilitário

  function extrairVideoId(url) {
    const patterns = [
      /(?:v=|\/embed\/|\/shorts\/)([a-zA-Z0-9_-]{11})/,
      /youtu\.be\/([a-zA-Z0-9_-]{11})/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  function hora() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function setStatus(state, label) {
    const dot = document.getElementById('statusDot');
    const lbl = document.getElementById('statusLabel');
    dot.className = 'status-dot ' + (state || '');
    lbl.textContent = label;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!document.getElementById('btnSend').disabled) enviarPergunta();
    }
  }

  //  Mensagens

  function addMessage(text, role) {
    const container = document.getElementById('messages');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const meta = document.createElement('span');
    meta.className = 'msg-meta';
    meta.textContent = hora();

    div.appendChild(bubble);
    div.appendChild(meta);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function addTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot typing';
    div.id = 'typing';
    div.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  // Carregar vídeo

  async function carregarVideo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showToast('Cole o link do YouTube primeiro', true); return; }

    const videoId = extrairVideoId(url);
    if (!videoId) { showToast('Link inválido. Use um link do YouTube', true); return; }


    const iframe = document.getElementById('player');
    iframe.referrerPolicy = "strict-origin-when-cross-origin";
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
    iframe.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';


    const btn = document.getElementById('btnLoad');
    const bar = document.getElementById('processingBar');
    btn.disabled = true;
    bar.classList.add('active');
    setStatus('loading', 'processando vídeo...');
    document.getElementById('processingLabel').textContent = 'Baixando e transcrevendo o vídeo...';

    try {
      const res = await fetch(`${API_BASE}/video/processar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) throw new Error('Erro no servidor');

      videoCarregado = true;
      document.getElementById('btnSend').disabled = false;
      document.getElementById('chatInput').placeholder = 'Faça uma pergunta sobre o vídeo...';
      setStatus('ready', 'pronto');
      bar.classList.remove('active');
      showToast('Vídeo processado! Pode perguntar.');

    } catch (err) {
      setStatus('', 'erro no processamento');
      bar.classList.remove('active');
      showToast('Erro ao processar o vídeo. Verifique o servidor.', true);
    } finally {
      btn.disabled = false;
    }
  }



  async function enviarPergunta() {
    const input = document.getElementById('chatInput');
    const pergunta = input.value.trim();
    if (!pergunta) return;
    if (!videoCarregado) { showToast('Carregue um vídeo primeiro', true); return; }

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btnSend').disabled = true;

    addMessage(pergunta, 'user');
    addTyping();

    try {
      const res = await fetch(`${API_BASE}/chat/perguntar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pergunta })
      });

      if (!res.ok) throw new Error('Erro no servidor');

      const resposta = await res.text();
      removeTyping();
      addMessage(resposta, 'bot');

    } catch (err) {
      removeTyping();
      addMessage('Não consegui me conectar ao servidor. Verifique se o backend está rodando.', 'bot');
    } finally {
      document.getElementById('btnSend').disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
