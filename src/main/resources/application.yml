spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/videochatbot
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
      embedding:
        model: nomic-embed-text

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
groq:
  api:
    key: ${GROQ_API_KEY}
app:
  audio:
    temp-dir: ${java.io.tmpdir}/videochatbot